apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentry-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sentry-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentry-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "sentry-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sentry-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --sentry-url={{ .Values.operator.sentryURL }}
            - --sentry-token-env={{ .Values.operator.sentryTokenEnv }}
            - --default-organization={{ .Values.operator.defaultOrganization }}
            - --default-team={{ .Values.operator.defaultTeam }}
            - --default-platform={{ .Values.operator.defaultPlatform }}
            - --default-retain-on-delete={{ .Values.operator.defaultRetainOnDelete }}
            - --requeue-interval={{ .Values.operator.requeueInterval }}
            - --leader-elect={{ .Values.operator.leaderElect }}
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          env:
            - name: {{ .Values.operator.sentryTokenEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentry-operator.tokenSecretName" . }}
                  key: {{ .Values.operator.sentryTokenEnv }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

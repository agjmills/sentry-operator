---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: sentryprojects.sentry-operator.io
spec:
  group: sentry-operator.io
  names:
    kind: SentryProject
    listKind: SentryProjectList
    plural: sentryprojects
    shortNames:
      - sp
    singular: sentryproject
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.projectSlug
          name: Project
          type: string
        - jsonPath: .status.secretName
          name: Secret
          type: string
        - jsonPath: ".status.conditions[?(@.type=='Ready')].status"
          name: Ready
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: >
            SentryProject is the Schema for the sentryprojects API.
            Creating a SentryProject causes the operator to provision a project in Sentry
            and write a Secret containing SENTRY_DSN into the same namespace.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: SentryProjectSpec defines the desired state of a SentryProject.
              properties:
                organization:
                  description: >
                    Organization is the Sentry organization slug.
                    Falls back to the operator's --default-organization flag if unset.
                  type: string
                team:
                  description: >
                    Team is the Sentry team slug that owns this project.
                    Falls back to the operator's --default-team flag if unset.
                  type: string
                platform:
                  description: >
                    Platform is the Sentry platform identifier (e.g. "go", "python-django", "javascript").
                    Falls back to the operator's --default-platform flag if unset.
                  type: string
                projectSlug:
                  description: >
                    ProjectSlug overrides the Sentry project slug.
                    Defaults to the resource's metadata.name.
                  type: string
                secretName:
                  description: >
                    SecretName is the name of the Kubernetes Secret created in this namespace.
                    Defaults to "<metadata.name>-sentry".
                  type: string
                retainOnDelete:
                  default: true
                  description: >
                    RetainOnDelete controls whether the Sentry project is deleted when this
                    resource is deleted. Defaults to true (project is retained).
                    Set to false to cascade-delete the Sentry project.
                  type: boolean
                keys:
                  description: >
                    Keys defines the Sentry DSN keys to create and manage for this project.
                    If empty, the first existing key is used and written as SENTRY_DSN.
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        description: Name is the label given to this key in Sentry.
                        type: string
                      secretKey:
                        description: >
                          SecretKey is the key name written into the Kubernetes Secret.
                          Defaults to "SENTRY_DSN" for the first key, "SENTRY_DSN_<NAME>" for subsequent ones.
                        type: string
                      rateLimit:
                        description: RateLimit configures the inbound event rate limit for this key.
                        type: object
                        properties:
                          count:
                            type: integer
                            minimum: 1
                          window:
                            type: integer
                            minimum: 1
                            default: 3600
                        required:
                          - count
                          - window
                    required:
                      - name
                defaultRateLimit:
                  description: DefaultRateLimit applies to all keys that do not have their own rateLimit set.
                  type: object
                  properties:
                    count:
                      type: integer
                      minimum: 1
                    window:
                      type: integer
                      minimum: 1
                      default: 3600
                  required:
                    - count
                    - window
                secretKeys:
                  description: SecretKeys controls the key names written into the output Secret.
                  properties:
                    dsn:
                      default: SENTRY_DSN
                      description: DSN is the key name for the Sentry DSN value. Defaults to "SENTRY_DSN".
                      type: string
                    environment:
                      default: SENTRY_ENVIRONMENT
                      description: Environment is the key name for the Sentry environment annotation. Defaults to "SENTRY_ENVIRONMENT".
                      type: string
                    release:
                      default: SENTRY_RELEASE
                      description: Release is the key name for the Sentry release annotation. Defaults to "SENTRY_RELEASE".
                      type: string
                  type: object
              type: object
            status:
              description: SentryProjectStatus defines the observed state of a SentryProject.
              properties:
                conditions:
                  items:
                    description: Condition contains details for one aspect of the current state of this API resource.
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastSyncTime:
                  description: LastSyncTime is the timestamp of the last successful reconciliation.
                  format: date-time
                  type: string
                observedGeneration:
                  description: ObservedGeneration is the generation last processed by the controller.
                  format: int64
                  type: integer
                projectSlug:
                  description: ProjectSlug is the slug of the provisioned Sentry project.
                  type: string
                secretName:
                  description: SecretName is the name of the Kubernetes Secret that was created.
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}

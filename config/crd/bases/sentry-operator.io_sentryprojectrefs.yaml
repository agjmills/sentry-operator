---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: sentryprojectrefs.sentry-operator.io
spec:
  group: sentry-operator.io
  names:
    kind: SentryProjectRef
    listKind: SentryProjectRefList
    plural: sentryprojectrefs
    shortNames:
      - spr
    singular: sentryprojectref
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.projectSlug
          name: Project
          type: string
        - jsonPath: .status.secretName
          name: Secret
          type: string
        - jsonPath: ".status.conditions[?(@.type=='Ready')].status"
          name: Ready
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: >
            SentryProjectRef references an existing Sentry project and writes its DSN
            into a Kubernetes Secret. Unlike SentryProject, it never creates or deletes
            the Sentry project itself.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: SentryProjectRefSpec defines the desired state of a SentryProjectRef.
              properties:
                organization:
                  description: >
                    Organization is the Sentry organization slug.
                    Falls back to the operator's --default-organization flag if unset.
                  type: string
                projectSlug:
                  description: ProjectSlug is the slug of the existing Sentry project to reference.
                  type: string
                secretName:
                  description: >
                    SecretName is the name of the Kubernetes Secret created in this namespace.
                    Defaults to "<metadata.name>-sentry".
                  type: string
                keys:
                  description: >
                    Keys defines the Sentry DSN keys to fetch for this project.
                    Keys are not created — they must already exist in Sentry.
                    If empty, the first existing key is used and written as SENTRY_DSN.
                  type: array
                  items:
                    $ref: '#/components/schemas/KeySpec'
                    type: object
                    properties:
                      name:
                        description: Name is the label of the Sentry key to reference.
                        type: string
                      secretKey:
                        description: >
                          SecretKey is the key name written into the Kubernetes Secret.
                          Defaults to "SENTRY_DSN" for the first key, "SENTRY_DSN_<NAME>" for subsequent ones.
                        type: string
                      rateLimit:
                        description: RateLimit configures the inbound event rate limit for this key.
                        type: object
                        properties:
                          count:
                            type: integer
                            minimum: 1
                          window:
                            type: integer
                            minimum: 1
                            default: 3600
                        required:
                          - count
                          - window
                    required:
                      - name
                secretKeys:
                  description: SecretKeys controls the key names written into the output Secret (single-key fallback mode).
                  type: object
                  properties:
                    dsn:
                      default: SENTRY_DSN
                      type: string
                    environment:
                      default: SENTRY_ENVIRONMENT
                      type: string
                    release:
                      default: SENTRY_RELEASE
                      type: string
                defaultRateLimit:
                  description: DefaultRateLimit applies to all keys that do not have their own rateLimit set.
                  type: object
                  properties:
                    count:
                      type: integer
                      minimum: 1
                    window:
                      type: integer
                      minimum: 1
                      default: 3600
                  required:
                    - count
                    - window
              required:
                - projectSlug
              type: object
            status:
              description: SentryProjectRefStatus defines the observed state of a SentryProjectRef.
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastSyncTime:
                  format: date-time
                  type: string
                observedGeneration:
                  format: int64
                  type: integer
                projectSlug:
                  type: string
                secretName:
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}

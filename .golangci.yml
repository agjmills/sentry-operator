linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/agjmills/sentry-operator

issues:
  exclude-rules:
    - path: zz_generated
      linters: [all]

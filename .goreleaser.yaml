version: 2

project_name: sentry-operator

before:
  hooks:
    - go mod tidy

builds:
  - id: manager
    main: ./cmd/main.go
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

dockers_v2:
  - id: sentry-operator
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - ghcr.io/agjmills/sentry-operator:{{ .Tag }}
      - ghcr.io/agjmills/sentry-operator:latest
      - ghcr.io/agjmills/sentry-operator:{{ .Major }}
      - ghcr.io/agjmills/sentry-operator:{{ .Major }}.{{ .Minor }}
    build_flag_templates:
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Tag }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.source=https://github.com/agjmills/sentry-operator
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=Apache-2.0
    platforms:
      - linux/amd64
      - linux/arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
  - id: binary
    artifacts: binary

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - sign
      - --yes
      - ${artifact}
    artifacts: images
    output: true

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'

release:
  github:
    owner: agjmills
    name: sentry-operator
  name_template: "{{ .Tag }}"
